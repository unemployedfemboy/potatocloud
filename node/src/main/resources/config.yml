console:
  # Console prompt text (%user% = current user)
  prompt: '&7&a%user%&7@cloud ~> '

  # Show banner on startup
  enable-banner: true

  # Primary color code for console messages and prompt
  # Supported colors: https://www.ditig.com/256-colors-cheat-sheet)
  primary-color: 42

  # Show player join and leave messages in the console
  log-player-connections: true

service:
  # Starting port for new services
  service-start-port: 30000

  # Starting port for new proxies
  proxy-start-port: 25565

  # Splitter used in service names
  service-splitter: '-'

  # Auto updates platform jars to latest build in the same MC version.
  # Also updates MC version if using 'platform-latest'
  auto-update-platforms: true

folders:
  groups: groups
  static: services/static
  temp-services: services/temp
  templates: templates
  platforms: platforms
  logs: logs
  data: data

node:
  host: 127.0.0.1
  port: 16000
